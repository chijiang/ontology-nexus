syntax = "proto3";

package work_ticket;

import "common.proto";

message WorkTicket {
  string responseid = 1;
  int32 osat = 2;
  string why_osat_en_mask = 3;
  int32 first_time_resolution = 4;
  int32 ease_use = 5;
  
  int32 survey_id = 6;
  int32 time_period_id = 7;
  int32 location_id = 8;
  int32 product_id = 9;
  int32 so_information_id = 10;
}

message GetWorkTicketRequest {
  string responseid = 1;
}

message ListWorkTicketsRequest {
  string query = 1; // Can be simple text search
  PaginationRequest pagination = 2;
}

message ListWorkTicketsResponse {
  repeated WorkTicket items = 1;
  PaginationResponse pagination = 2;
}

service WorkTicketService {
  rpc GetWorkTicket(GetWorkTicketRequest) returns (WorkTicket) {}
  rpc ListWorkTickets(ListWorkTicketsRequest) returns (ListWorkTicketsResponse) {}
}
